name: Deploy Firebase Hosting and Rules

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment secrets
        env:
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
          VITE_FIREBASE_CONFIG_BASE64: ${{ secrets.VITE_FIREBASE_CONFIG_BASE64 }}
        run: |
          test -n "$FIREBASE_SERVICE_ACCOUNT_BASE64" || {
            echo "::error::FIREBASE_SERVICE_ACCOUNT_BASE64 is not configured"
            exit 1
          }
          test -n "$VITE_FIREBASE_CONFIG_BASE64" || {
            echo "::error::VITE_FIREBASE_CONFIG_BASE64 is not configured"
            exit 1
          }

      - name: Restore Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_BASE64" | base64 --decode > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Type-check
        run: npm run lint

      - name: Build production site
        env:
          VITE_FIREBASE_CONFIG_BASE64: ${{ secrets.VITE_FIREBASE_CONFIG_BASE64 }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@latest

      - name: Validate Firebase configuration
        run: |
          test -f dist/index.html
          test -f firestore.rules
          firebase projects:list --non-interactive

      - name: Deploy Hosting and Firestore rules
        run: |
          firebase deploy \
            --project ghader-tourism \
            --only hosting,firestore:rules \
            --non-interactive
